spring.application.name=taskmanager
spring.datasource.url=jdbc:h2:mem:demo;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.h2.console.enabled=true

# ?? ??
logging.level.org.hibernate.sql=debug
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=trace

# jwt (access-token only for now)
app.jwt.issuer=taskmanager
# NOTE: for demo only. In real services keep it in env/secret manager.
app.jwt.secret=change-me-to-a-long-random-string-at-least-32-chars
app.jwt.access-token-exp-seconds=900
